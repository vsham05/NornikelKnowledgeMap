# Онтология свойств материалов
# Используется для валидации извлеченных свойств и UI

property_categories:
  mechanical:
    label: "Механические свойства"
    description: "Прочность, твердость, пластичность"
  
  thermal:
    label: "Термические свойства"
    description: "Температуры фазовых превращений, теплопроводность"
  
  physical:
    label: "Физические свойства"
    description: "Плотность, модули упругости"
  
  chemical:
    label: "Химические свойства"
    description: "Состав, коррозионная стойкость"
  
  microstructure:
    label: "Микроструктура"
    description: "Фазы, морфология, размер зерна"
  
  technological:
    label: "Технологические свойства"
    description: "Обрабатываемость, свариваемость"


# Справочник свойств с ожидаемыми единицами измерения
properties:
  # Механические
  yield_strength:
    label: "Предел текучести"
    category: mechanical
    expected_units: ["MPa", "GPa"]
    value_type: scalar
    
  ultimate_tensile_strength:
    label: "Предел прочности"
    category: mechanical
    expected_units: ["MPa", "GPa"]
    value_type: scalar
    
  elongation:
    label: "Относительное удлинение"
    category: mechanical
    expected_units: ["%"]
    value_type: scalar
    range: [0, 100]
    
  hardness_hv:
    label: "Твердость по Виккерсу"
    category: mechanical
    expected_units: ["HV"]
    value_type: scalar
    
  hardness_hrc:
    label: "Твердость по Роквеллу"
    category: mechanical
    expected_units: ["HRC"]
    value_type: scalar
    
  impact_toughness:
    label: "Ударная вязкость"
    category: mechanical
    expected_units: ["J/cm²", "MJ/m²"]
    value_type: scalar
    
  fatigue_limit:
    label: "Предел выносливости"
    category: mechanical
    expected_units: ["MPa"]
    value_type: scalar
    
  fracture_toughness:
    label: "Вязкость разрушения"
    category: mechanical
    expected_units: ["MPa·m^0.5"]
    value_type: scalar
    
  # Термические
  melting_point:
    label: "Температура плавления"
    category: thermal
    expected_units: ["°C", "K"]
    value_type: range_or_scalar
    
  annealing_temperature:
    label: "Температура отжига"
    category: thermal
    expected_units: ["°C"]
    value_type: scalar
    
  thermal_conductivity:
    label: "Теплопроводность"
    category: thermal
    expected_units: ["W/(m·K)"]
    value_type: scalar
    
  # Физические
  density:
    label: "Плотность"
    category: physical
    expected_units: ["g/cm³", "kg/m³"]
    value_type: scalar
    
  young_modulus:
    label: "Модуль Юнга"
    category: physical
    expected_units: ["GPa"]
    value_type: scalar
    
  poisson_ratio:
    label: "Коэффициент Пуассона"
    category: physical
    expected_units: [""]
    value_type: scalar
    range: [0, 0.5]
    
  # Химические
  composition:
    label: "Химический состав"
    category: chemical
    expected_units: ["%", "mass%", "at%"]
    value_type: dict
    
  corrosion_rate:
    label: "Скорость коррозии"
    category: chemical
    expected_units: ["mm/year", "g/(m²·h)"]
    value_type: scalar
    
  # Микроструктура
  grain_size:
    label: "Размер зерна"
    category: microstructure
    expected_units: ["μm", "mm"]
    value_type: scalar_or_range
    
  phase_composition:
    label: "Фазовый состав"
    category: microstructure
    expected_units: ["%"]
    value_type: dict


# Параметры режимов обработки
regime_parameters:
  temperature:
    label: "Температура"
    expected_units: ["°C", "K"]
    value_type: scalar
    
  duration:
    label: "Длительность"
    expected_units: ["h", "min", "s"]
    value_type: scalar
    
  cooling_rate:
    label: "Скорость охлаждения"
    expected_units: ["°C/min", "°C/s"]
    value_type: scalar
    
  heating_rate:
    label: "Скорость нагрева"
    expected_units: ["°C/min", "°C/s"]
    value_type: scalar
    
  atmosphere:
    label: "Атмосфера"
    expected_units: []
    value_type: string
    examples: ["воздух", "вакуум", "аргон", "азот"]
    
  deformation:
    label: "Деформация"
    expected_units: ["%"]
    value_type: scalar
    range: [0, 100]
    
  pressure:
    label: "Давление"
    expected_units: ["MPa", "Pa", "atm", "kPa"]
    value_type: scalar

  ph:
    label: "pH"
    expected_units: []
    value_type: scalar

  concentration:
    label: "Концентрация"
    expected_units: ["mg/L", "g/L", "ppm", "мг/л", "г/л"]
    value_type: scalar

  flow_rate:
    label: "Расход"
    expected_units: ["m3/h", "L/min", "m/h", "м³/ч", "м/ч"]
    value_type: scalar

  global_production:
    label: "Global/world production"
    category: technological
    expected_units: ["million tonnes", "Mt", "t/y", "tonnes/year", "t/a", "tonnes"]
    value_type: scalar

  annual_production:
    label: "Annual production"
    category: technological
    expected_units: ["million tonnes", "Mt", "t/y", "tonnes/year", "t/a", "tonnes"]
    value_type: scalar


# Типы режимов обработки
regime_types:
  heat_treatment:
    label: "Термическая обработка"
    typical_parameters: ["temperature", "duration", "cooling_rate", "atmosphere"]
    
  annealing:
    label: "Отжиг"
    parent: heat_treatment
    
  quenching:
    label: "Закалка"
    parent: heat_treatment
    
  aging:
    label: "Старение"
    parent: heat_treatment
    
  mechanical:
    label: "Механическая обработка"
    typical_parameters: ["deformation", "temperature"]
    
  thermomechanical:
    label: "Термомеханическая обработка"
    typical_parameters: ["temperature", "deformation", "duration"]


# ---------------------------------------------------------------------------
# Material taxonomy — mining / metallurgy process materials
# References: ISO TC 102/183 ores & concentrates; PMDco material entity
# ---------------------------------------------------------------------------

material_taxonomy:
  version: "1.0"
  reference: "ISO TC 102/183 ores & concentrates; PMDco material entity; process-stream classification"

material_classes:
  ore:
    label: "Ore & run-of-mine"
    label_ru: "Руда"
    stage: feedstock
    description: "Run-of-mine ore, crude ore, ore bodies (laterite, sulfide, oxide)"
    aliases: [ore, rom, run-of-mine, crude ore, oxide ore, sulfide ore, iron ore, nickel ore]
    name_patterns: [ore, руда, laterite, saprolite, limonite, pentlandite, chalcopyrite]

  mineral:
    label: "Mineral & gangue"
    label_ru: "Минерал"
    stage: feedstock
    description: "Identified ore minerals and gangue (ISO 14689 rock/mineral identification)"
    aliases: [mineral, gangue, ore mineral, rock]
    name_patterns: [mineral, gangue, quartz, feldspar, pyrite, magnetite]

  concentrate:
    label: "Concentrate"
    label_ru: "Концентрат"
    stage: beneficiation
    description: "Beneficiated flotation/gravity/magnetic concentrate (ISO TC 183)"
    aliases: [concentrate, flotation concentrate, nickel concentrate, copper concentrate, feed concentrate]
    name_patterns: [concentrate, концентрат, conc.]

  intermediate:
    label: "Metallurgical intermediate"
    label_ru: "Промежуточный продукт"
    stage: processing
    description: "Semi-finished metallurgical products in the plant stream"
    aliases: [matte, slag, blister, anode, cathode, sponge, precipitate, leach residue, tailings, calcine, sinter]
    name_patterns: [matte, slag, шлак, cathode, anode, sponge, precipitate, tailings, calcine, blister, промежут]

  metal:
    label: "Metal"
    label_ru: "Металл"
    stage: product
    description: "Elemental metals and unalloyed metal products"
    aliases: [metal, pure metal, unalloyed, cathode metal, electrolytic nickel, electrolytic copper]
    name_patterns: [nickel, copper, cobalt, zinc, titanium, zirconium, tantalum, lead, iron, metal]

  alloy:
    label: "Alloy & steel"
    label_ru: "Сплав / сталь"
    stage: engineering
    description: "Engineered alloys, stainless and specialty steels (PMDco alloy)"
    aliases: [alloy, steel, stainless steel, stainless, duplex, hastelloy, inconel, aisi, ss316, ss304]
    name_patterns: [alloy, steel, stainless, hastelloy, inconel, aisi, ss304, ss316, сплав, сталь]

  solution:
    label: "Process fluid"
    label_ru: "Процессный раствор"
    stage: processing
    description: "Leachates, electrolytes, liquors, pregnant solutions (PLS), catholyte/anolyte"
    aliases: [solution, electrolyte, leachate, liquor, pls, pregnant liquor, catholyte, anolyte, spent electrolyte]
    name_patterns: [electrolyte, leachate, liquor, catholyte, anolyte, solution, раствор]

  reagent:
    label: "Reagent & consumable"
    label_ru: "Реагент"
    stage: processing
    description: "Process chemicals and consumables (acids, bases, collectors, flocculants)"
    aliases: [reagent, acid, base, collector, flocculant, flux, solvent, leaching agent]
    name_patterns: [reagent, acid, h2so4, hcl, naoh, collector, flocculant, реагент, кислот]

  compound:
    label: "Chemical compound"
    label_ru: "Химическое соединение"
    stage: processing
    description: "Defined chemical species (salts, carbonates, sulfates, oxides)"
    aliases: [compound, salt, carbonate, sulfate, oxide, hydroxide, nickel sulfate, nickel carbonate]
    name_patterns: [carbonate, sulfate, sulphate, chloride, oxide, hydroxide, niso4, nico3]

  composite:
    label: "Composite & clad"
    label_ru: "Композит"
    stage: engineering
    description: "Multi-phase or clad engineered materials"
    aliases: [composite, clad, titanium clad, bimetallic, matrix composite]
    name_patterns: [composite, clad, bimetal, matrix]

  ceramic:
    label: "Ceramic & refractory"
    label_ru: "Керамика / огнеупор"
    stage: engineering
    description: "Refractories, ceramics, oxide matrices"
    aliases: [ceramic, refractory, alumina, zirconia, brick]
    name_patterns: [ceramic, refractory, alumina, zirconia, керамик, огнеупор]

  polymer:
    label: "Polymer & coating"
    label_ru: "Полимер / покрытие"
    stage: engineering
    description: "Polymers, elastomers, linings and coatings (PTFE, rubber)"
    aliases: [polymer, plastic, rubber, ptfe, teflon, coating, liner, elastomer]
    name_patterns: [polymer, ptfe, teflon, rubber, coating, liner, полимер]

  other:
    label: "Other / unclassified"
    label_ru: "Прочее"
    stage: other
    description: "Materials that do not fit a process-stream class"
    aliases: [other, unknown, miscellaneous]
    name_patterns: []