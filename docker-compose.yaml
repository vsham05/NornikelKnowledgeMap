# One-command full stack — Docker only (no separate Ollama install).
#
#   cp .env.example .env.docker
#   ./start-docker.sh          # Linux / macOS
#   start-docker.bat           # Windows
#
# First run downloads Ollama models (~10 GB) via ollama-pull — may take 10–30 min.
# Ollama requires NVIDIA GPU (see start-docker.sh / start-docker.bat).

services:
  neo4j:
    image: neo4j:5.25-community
    container_name: skg-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/password123
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  qdrant:
    image: qdrant/qdrant:v1.13.4
    container_name: skg-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  minio:
    image: minio/minio:latest
    container_name: skg-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    container_name: skg-ollama
    gpus: all
    ports:
      - "11434:11434"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      # Offload every layer to GPU — no CPU inference fallback
      OLLAMA_NUM_GPU: "999"
      OLLAMA_FLASH_ATTENTION: "1"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s

  ollama-pull:
    image: ollama/ollama:latest
    container_name: skg-ollama-pull
    gpus: all
    depends_on:
      ollama:
        condition: service_healthy
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_PULL_MODELS: ${OLLAMA_PULL_MODELS:-qwen3:8b,mxbai-embed-large,minicpm-v}
    volumes:
      - ./scripts/docker-pull-ollama-models.sh:/pull.sh:ro
      - ./scripts/patch-ollama-models-gpu.sh:/patch-gpu.sh:ro
      - ./scripts/verify-ollama-gpu.sh:/verify-gpu.sh:ro
    entrypoint: ["/bin/sh", "/pull.sh"]
    restart: "no"

  backend:
    build:
      context: ./nornikel-backend
    container_name: skg-backend
    ports:
      - "8000:8000"
    env_file:
      - path: .env.docker
        required: false
    environment:
      NEO4J_URI: bolt://neo4j:7687
      QDRANT_URL: http://qdrant:6333
      MINIO_ENDPOINT: minio:9000
      LLM_BASE_URL: http://ollama:11434/v1
      EMBEDDING_BASE_URL: http://ollama:11434/v1
      VLM_BASE_URL: http://ollama:11434/v1
    depends_on:
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      minio:
        condition: service_healthy
      ollama-pull:
        condition: service_completed_successfully
    restart: unless-stopped

  frontend:
    build:
      context: .
      args:
        NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-http://localhost:8000}
    container_name: skg-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  neo4j_data:
  neo4j_logs:
  qdrant_data:
  minio_data:
  ollama_data:
